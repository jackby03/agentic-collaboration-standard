[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentic-standard"
version = "1.0.2"
description = "CLI for the Agentic Collaboration Standard"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
keywords = ["acs", "agentic", "collaboration", "standard", "cli"]
dependencies = ["pyyaml>=6.0"]

[project.urls]
Homepage = "https://acs.jackby03.com"
Repository = "https://github.com/jackby03/agentic-collaboration-standard"

[project.scripts]
acs = "acs_cli.__main__:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["acs_cli*"]
